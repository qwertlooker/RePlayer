name: windows-verify-package

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Debug)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Debug)
        run: cmake --build build --config Debug

      - name: Test (Debug)
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Configure (Release)
        run: cmake -S . -B build-release -G "Visual Studio 17 2022" -A x64 -DREPLAYER_ENABLE_STATIC_CRT=OFF

      - name: Build (Release)
        run: cmake --build build-release --config Release

      - name: Install package layout
        run: cmake --install build-release --config Release --prefix out

      - name: Verify package layout
        shell: pwsh
        run: .\scripts\verify_package.ps1 -PackageRoot .\out

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path out/* -DestinationPath RePlayer-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RePlayer-windows-x64
          path: RePlayer-windows-x64.zip
