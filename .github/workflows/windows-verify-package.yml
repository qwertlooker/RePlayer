name: windows-verify-package

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Release)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          Copy-Item "build/Release/RePlayer.exe" "out/RePlayer.exe"

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path out/* -DestinationPath RePlayer-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RePlayer-windows-x64
          path: RePlayer-windows-x64.zip
